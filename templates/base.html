<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Dynamic page title — falls back to default if no title passed by Flask -->
    <title>OTOMA - {{ title if title else "Prestige Automobile" }}</title>
    <!-- Google Fonts — Playfair Display for headings, Lato for body text -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ============================================================
     HEADER
     Sticky navigation bar with logo, nav links and contact CTA
     Becomes frosted glass on scroll via the header-scrolled class
     ============================================================ -->
<header id="main-header">
    <div class="header-container">

        <!-- OTOMA logo — enlarged for better visibility -->
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="OTOMA Logo">

        <!-- Main navigation links with animated underline on hover -->
        <nav class="nav-menu">
            <a href="{{ url_for('home') }}"><span>Accueil</span></a>
            <a href="{{ url_for('catalogue') }}"><span>Catalogue</span></a>
            <a href="{{ url_for('about') }}"><span>À propos</span></a>
            <a href="{{ url_for('sell') }}"><span>Vendre</span></a>
        </nav>

        <!-- Contact info and appointment CTA -->
        <div class="header-contact">
            <!-- Phone number — clickable via tel: link
                 Allows mobile users to call directly
                 and desktop users to copy the number -->
            <a href="tel:0610203040" class="phone">06 10 20 30 40</a>
            <!-- RDV button wrapped in a link -->
            <a href="{{ url_for('rdv') }}">
                <button class="btn-rdv">Prendre RDV</button>
            </a>
        </div>

    </div>
    <!-- Red decorative separator line below the header -->
    <div class="header-separator"></div>
</header>

<!-- ============================================================
     MAIN CONTENT
     Each page injects its content here via Jinja2 block inheritance
     ============================================================ -->
<main>
    {% block content %}{% endblock %}
</main>

<!-- ============================================================
     FOOTER
     Contains copyright, legal links and OTOMA logo
     ============================================================ -->
<footer>
    <div class="footer-content">
        <div class="footer-texts">
            <p>© 2025 OTOMA — Tous droits réservés</p>
        </div>
        <div class="footer-links">
            <a href="{{ url_for('cookies') }}">Cookies</a>
            <a href="{{ url_for('mentions_legales') }}">Mentions légales</a>
        </div>
        <div class="footer-logo-block">
            <img src="{{ url_for('static', filename='logo.png') }}" class="footer-logo" alt="Logo OTOMA">
        </div>
    </div>
</footer>

<script>
// ============================================================
// HEADER SCROLL EFFECT
// Adds frosted glass style when user scrolls past 60px
// ============================================================
const header = document.getElementById('main-header');
window.addEventListener('scroll', () => {
    header.classList.toggle('header-scrolled', window.scrollY > 60);
});

// ============================================================
// SCROLL-TRIGGERED FADE-IN ANIMATIONS
// Observes elements with 'animate-in' class and triggers
// the CSS transition when they enter the viewport
// ============================================================
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.08 });

function observeAnimations() {
    document.querySelectorAll('.animate-in:not(.is-visible)').forEach(el => observer.observe(el));
}
observeAnimations();

// Exposed globally so dynamic pages can trigger it after injecting new DOM elements
window.refreshAnimations = observeAnimations;

// ============================================================
// HERO PARALLAX EFFECT
// Moves the hero image at 30% of scroll speed for depth effect
// ============================================================
const heroBg = document.querySelector('.concession-img');
if (heroBg) {
    window.addEventListener('scroll', () => {
        heroBg.style.transform = `translateY(${window.scrollY * 0.3}px)`;
    });
}
</script>

</body>
</html>
