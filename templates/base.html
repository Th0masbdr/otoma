<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOMA - {{ title if title else "Prestige Automobile" }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="custom-cursor"></div>

<header id="main-header">
    <div class="header-container">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="OTOMA Logo">
        <nav class="nav-menu">
            <a href="{{ url_for('home') }}"><span>Accueil</span></a>
            <a href="{{ url_for('catalogue') }}"><span>Catalogue</span></a>
            <a href="{{ url_for('about') }}"><span>À propos</span></a>
            <a href="{{ url_for('sell') }}"><span>Vendre</span></a>
        </nav>
        <div class="header-contact">
            <span class="phone">06 10 20 30 40</span>
            <a href="{{ url_for('rdv') }}">
                <button class="btn-rdv">Prendre RDV</button>
            </a>
        </div>
    </div>
    <div class="header-separator"></div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <div class="footer-content">
        <div class="footer-texts">
            <p>© 2025 OTOMA — Tous droits réservés</p>
        </div>
        <div class="footer-links">
            <a href="{{ url_for('cookies') }}">Cookies</a>
            <a href="{{ url_for('mentions_legales') }}">Mentions légales</a>
        </div>
        <div class="footer-logo-block">
            <img src="{{ url_for('static', filename='logo.png') }}" class="footer-logo" alt="Logo OTOMA">
        </div>
    </div>
</footer>

<script>
// -----------------------------------------------
// CURSEUR PERSONNALISÉ
// -----------------------------------------------
const cursor = document.getElementById('custom-cursor');
let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
cursor.textContent = '🏎️';

document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

function animateCursor() {
    cursorX += (mouseX - cursorX) * 0.14;
    cursorY += (mouseY - cursorY) * 0.14;
    cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
    requestAnimationFrame(animateCursor);
}
animateCursor();

// Fonction globale pour attacher les events curseur
function attachCursorEvents() {
    document.querySelectorAll('a, button, .car-card, .carousel-btn').forEach(el => {
        if (el._cursorBound) return; // évite les doublons
        el._cursorBound = true;
        el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
    });
}

// Appel initial
attachCursorEvents();

// Ré-appel disponible globalement pour les pages qui injectent des cartes dynamiquement
window.refreshCursorEvents = attachCursorEvents;

// -----------------------------------------------
// HEADER SCROLL
// -----------------------------------------------
const header = document.getElementById('main-header');
window.addEventListener('scroll', () => {
    header.classList.toggle('header-scrolled', window.scrollY > 60);
});

// -----------------------------------------------
// ANIMATIONS ENTRÉE
// -----------------------------------------------
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.08 });

function observeAnimations() {
    document.querySelectorAll('.animate-in:not(.is-visible)').forEach(el => observer.observe(el));
}
observeAnimations();
window.refreshAnimations = observeAnimations;

// -----------------------------------------------
// PARALLAXE HERO
// -----------------------------------------------
const heroBg = document.querySelector('.concession-img');
if (heroBg) {
    window.addEventListener('scroll', () => {
        heroBg.style.transform = `translateY(${window.scrollY * 0.3}px)`;
    });
}
</script>

</body>
</html>
